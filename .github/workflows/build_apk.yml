name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK (Chaquopy)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-chaquopy-v3-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-chaquopy-v3-${{ runner.os }}-

      - name: Stampa struttura e contenuto file gradle
        run: |
          echo "====== STRUTTURA ROOT ======"
          ls -la
          echo "====== STRUTTURA app/ ======"
          ls -la app/ || echo "MANCA app/"
          echo "====== settings.gradle ======"
          cat settings.gradle
          echo "====== build.gradle (root) ======"
          cat build.gradle
          echo "====== app/build.gradle ======"
          cat app/build.gradle || echo "MANCA app/build.gradle"
          echo "====== gradle.properties ======"
          cat gradle.properties || echo "MANCA gradle.properties"

      - name: Build APK debug
        run: gradle :app:assembleDebug --rerun-tasks --info 2>&1 | tee build.log || true

      - name: Carica log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-completo
          path: build.log
          retention-days: 7

      - name: Trova APK
        id: apk
        run: |
          APK=$(find . -name "*.apk" -path "*/debug/*" | head -1)
          if [ -z "$APK" ]; then echo "APK non trovato"; exit 1; fi
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "APK: $APK ($(du -h "$APK" | cut -f1))"

      - name: Carica APK
        uses: actions/upload-artifact@v4
        with:
          name: MusicMoodAnalyzer-APK
          path: ${{ steps.apk.outputs.apk_path }}
          retention-days: 30
